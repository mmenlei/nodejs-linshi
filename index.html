<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NovaForge Studio | Dynamic App Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#6c5ce7;
  --bg:#0f1220;
  --card:#171a2b;
  --text:#ffffff;
  --muted:#b6b9d6;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}

body{
  background:var(--bg);
  color:var(--text);
  transition:0.4s;
}

/* Layout */
.container{max-width:1100px;margin:auto;padding:60px 20px;}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 0;
}

.logo{
  font-weight:700;
  letter-spacing:1px;
  color:var(--primary);
}

.btn{
  padding:10px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.btn-primary{
  background:var(--primary);
  color:white;
}

.hero{
  text-align:center;
  padding:80px 0;
}

.hero h1{
  font-size:42px;
  margin-bottom:20px;
}

.hero p{
  color:var(--muted);
  max-width:700px;
  margin:auto;
}

/* Cards */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:60px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.footer{
  text-align:center;
  margin-top:80px;
  color:var(--muted);
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<header>
  <div class="logo">NovaForge</div>
  <button class="btn btn-primary">Get Started</button>
</header>

<section class="hero">
  <h1 id="heroTitle">Loading experience...</h1>
  <p id="heroDesc"></p>
</section>

<section class="grid" id="features"></section>

<div class="footer">
  Dynamic page engine • refresh = new layout
</div>

</div>

<script>
// ------------------------------
// 1. Random theme system
// ------------------------------
const themes = [
  {primary:"#6c5ce7",bg:"#0f1220",card:"#171a2b"},
  {primary:"#00d2d3",bg:"#0a1a1a",card:"#102525"},
  {primary:"#ff7675",bg:"#1a0f12",card:"#2a1418"},
  {primary:"#fdcb6e",bg:"#1a170a",card:"#2a2410"},
  {primary:"#55efc4",bg:"#0a1a12",card:"#10251c"}
];

const theme = themes[Math.floor(Math.random()*themes.length)];
document.documentElement.style.setProperty('--primary', theme.primary);
document.documentElement.style.setProperty('--bg', theme.bg);
document.documentElement.style.setProperty('--card', theme.card);

// ------------------------------
// 2. Random hero content
// ------------------------------
const titles = [
  "Build Anything Without Limits",
  "Your Ideas, Instantly Deployed",
  "Design Apps at the Speed of Thought",
  "From Concept to Product in Minutes"
];

const descs = [
  "A next-gen visual builder that adapts itself every time you open it.",
  "Create, test, and deploy applications with a self-evolving interface.",
  "NovaForge reshapes your workflow dynamically for maximum productivity.",
  "No templates. No limits. Just adaptive creation."
];

document.getElementById("heroTitle").innerText =
  titles[Math.floor(Math.random()*titles.length)];

document.getElementById("heroDesc").innerText =
  descs[Math.floor(Math.random()*descs.length)];

// ------------------------------
// 3. Dynamic features (shuffle)
// ------------------------------
const featuresPool = [
  "AI-assisted UI generation",
  "Realtime backend sync",
  "Auto database schema design",
  "One-click deployment",
  "Visual workflow builder",
  "Adaptive component system",
  "Smart API connector",
  "Cloud-native scaling engine"
];

// shuffle
featuresPool.sort(()=>Math.random()-0.5);

const featureContainer = document.getElementById("features");

featuresPool.slice(0,6).forEach(f=>{
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `<h3 style="color:var(--primary)">${f}</h3>
                   <p style="color:var(--muted);margin-top:10px">
                   Automatically adapted module inside NovaForge system.
                   </p>`;
  featureContainer.appendChild(div);
});

// ------------------------------
// 4. Slight motion randomness (feel alive)
// ------------------------------
document.body.style.transform = `rotate(${(Math.random()-0.5)*0.3}deg)`;
</script>

</body>
</html>
